testId: nfapi-pegatron-joule-cpu-bandwidth
testType: BANDWIDTH_SCALING
description: "NFAPI split test - Pegatron O-RU - Joule - PNF/VNF"
target:
    oduUrn: urn:o-ran:gnb:joule-pegatron
    cellUrn: urn:o-ran:cell:joule-pegatron
    sideloadInstanceId: 139d2f51-b3c2-4a94-a6a3-401464537f23
    cluster: cc1397ba-b1c4-4a3e-bc8d-6af58ef53818
nf:
  - artifactName: oai-pnf
    artifactRepoUrl: https://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@github.com/motangpuar/ocloud-helm-templates.git
    branch: starlingx/pegatron
    image:
      repository: bmw.ece.ntust.edu.tw/infidel/oai-gnb
      version: nfapi
    parameters:
        wr_isolcpus: [8,10]
        iperf_bandwidth_mbps: [100,400,700]
    baseline:
      wr_isolcpus: 10
      memory: 16Gi
      hugepages: 10Gi
    extra:
      ruCPlaneMacAdd: 48:21:0b:4b:dc:41
      ruUPlaneMacAdd: 48:21:0b:4b:dc:41
  - artifactName: oai-vnf
    artifactRepoUrl: https://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@github.com/motangpuar/ocloud-helm-templates.git
    branch: starlingx/pegatron
    image:
      repository: bmw.ece.ntust.edu.tw/infidel/oai-gnb
      version: nfapi
    baseline:
      cpu: 4
      wr_isolcpus: 0
      memory: 8Gi
      hugepages: 0
    extra:
      amfhost: 192.168.8.103

execution:
    runsPerCase: 1
    stabilizationTime: 30
    iperfDuration: 60
